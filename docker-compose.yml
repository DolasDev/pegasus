# Local development database.
#
# Usage:
#   docker compose up -d        # start in background
#   docker compose down         # stop (data persisted in volume)
#   docker compose down -v      # stop and wipe data
#
# After first start, apply migrations and seed data:
#   cd packages/api
#   npm run db:migrate
#   npm run db:seed
#
# Set DATABASE_URL and DIRECT_URL in packages/api/.env before running
# migrations (see packages/api/.env.example for the local connection string).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pegasus
      POSTGRES_PASSWORD: pegasus
      POSTGRES_DB: pegasus
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pegasus -d pegasus']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
