<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Pegasus Services</title>
    <link href="./main.css" rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <h3 class="title">Service Config</h3>
      <!-- All of the Node.js APIs are available in this renderer process. -->
      <form id="config-form">
        <div id="config-form-container-0"></div>
        <div id="config-form-container-1"></div>
        <div id="config-form-container-2"></div>
      </form>
      <div id="error-container"></div>
      <div id="success-container">
        Success
      </div>
      <div class="button-group">
        <button id="btn-save">Save Config</button>
        <button id="btn-setup-db">Setup Database</button>
        <button id="btn-setup-service">Setup Service</button>
        <button id="btn-test-smtp">Test SMTP</button>
      </div>
      <div class="button-group">
        <button id="btn-run-app">Start Service</button>
        <button id="btn-stop-app">Stop Service</button>
        <button id="btn-run-debug">Run in Debug</button>
        <button id="btn-tail-logs">View Logs</button>
      </div>
    </div>
    <script>
      // You can also require other files to run in this process
      require('./renderer.js')
    </script>
  </body>
</html>
