name: Deploy

# Canonical deploy path for Pegasus.
#
# - `push` to `main`: auto-deploys only the components whose source paths
#   changed (api, tenant-web, admin-web). Infra/workflow changes trigger a
#   full `--all` deploy. Staging deploys first, then prod (gated by the
#   `prod` GitHub environment's required-reviewer rule).
# - `workflow_dispatch`: manual run with a `target` input for forcing a
#   specific component. Same staging→prod flow.
#
# The actual deploy steps live in `_deploy.yml` (a reusable workflow) so
# the env-by-env chain stays linear and future gates (e.g. E2E tests
# against staging) can slot in between the calls without duplicating the
# CDK deploy logic.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Component to deploy'
        type: choice
        required: true
        default: all
        options:
          - all
          - api
          - tenant-web
          - admin-web

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which components changed. On workflow_dispatch the `target` input
  # wins; on push we use dorny/paths-filter against the previous commit.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.decide.outputs.api }}
      tenant_web: ${{ steps.decide.outputs.tenant_web }}
      admin_web: ${{ steps.decide.outputs.admin_web }}
      any: ${{ steps.decide.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/domain/**'
            tenant_web:
              - 'apps/tenant-web/**'
            admin_web:
              - 'apps/admin-web/**'
            infra:
              - 'packages/infra/**'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/_deploy.yml'
              - 'package-lock.json'

      - name: Decide components to deploy
        id: decide
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.target }}" in
              all)
                api=true; tenant=true; admin=true ;;
              api)
                api=true; tenant=false; admin=false ;;
              tenant-web)
                api=false; tenant=true; admin=false ;;
              admin-web)
                api=false; tenant=false; admin=true ;;
              *)
                echo "Unknown target: ${{ inputs.target }}"; exit 1 ;;
            esac
          else
            # push event — use path filter results, but infra changes force --all.
            if [[ "${{ steps.filter.outputs.infra }}" == "true" ]]; then
              api=true; tenant=true; admin=true
            else
              api="${{ steps.filter.outputs.api }}"
              tenant="${{ steps.filter.outputs.tenant_web }}"
              admin="${{ steps.filter.outputs.admin_web }}"
            fi
          fi
          echo "api=${api}" >> "$GITHUB_OUTPUT"
          echo "tenant_web=${tenant}" >> "$GITHUB_OUTPUT"
          echo "admin_web=${admin}" >> "$GITHUB_OUTPUT"
          if [[ "$api" == "true" || "$tenant" == "true" || "$admin" == "true" ]]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "### Deploy plan"
            echo "| Component | Deploy |"
            echo "|---|---|"
            echo "| api | ${api} |"
            echo "| tenant-web | ${tenant} |"
            echo "| admin-web | ${admin} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Staging deploy. Runs on push to main and workflow_dispatch from main.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to staging
    needs: changes
    if: needs.changes.outputs.any == 'true' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy.yml
    with:
      env-name: staging
      stack-prefix: PegasusStaging
      deploy-api: ${{ needs.changes.outputs.api }}
      deploy-tenant: ${{ needs.changes.outputs.tenant_web }}
      deploy-admin: ${{ needs.changes.outputs.admin_web }}
    permissions:
      id-token: write
      contents: read

  # ---------------------------------------------------------------------------
  # Prod deploy. Auto-runs after staging succeeds, but the `prod` GitHub
  # environment carries a required-reviewer rule, so the job pauses for
  # approval before the underlying deploy steps execute.
  #
  # When the E2E gate (sibling plan `gate-prod-deploy-on-staging-e2e.md`)
  # lands, an `e2e-staging` job slots between this and `deploy-staging`,
  # and `needs:` flips to `[changes, e2e-staging]`.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy to prod
    needs: [changes, deploy-staging]
    if: needs.changes.outputs.any == 'true' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy.yml
    with:
      env-name: prod
      stack-prefix: PegasusProd
      deploy-api: ${{ needs.changes.outputs.api }}
      deploy-tenant: ${{ needs.changes.outputs.tenant_web }}
      deploy-admin: ${{ needs.changes.outputs.admin_web }}
    permissions:
      id-token: write
      contents: read
