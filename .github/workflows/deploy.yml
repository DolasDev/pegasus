name: Deploy

# Canonical deploy path for Pegasus.
#
# - `push` to `main`: auto-deploys only the components whose source paths
#   changed (api, tenant-web, admin-web). Infra/workflow changes trigger a
#   full `--all` deploy.
# - `workflow_dispatch`: manual run with a `target` input for forcing a
#   specific component.
#
# Setup steps (OIDC role, GitHub environment, secrets) are documented in
# plans/todo/aws-oidc-setup.md (or plans/completed/ once done).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Component to deploy'
        type: choice
        required: true
        default: all
        options:
          - all
          - api
          - tenant-web
          - admin-web

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which components changed. On workflow_dispatch the `target` input
  # wins; on push we use dorny/paths-filter against the previous commit.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.decide.outputs.api }}
      tenant_web: ${{ steps.decide.outputs.tenant_web }}
      admin_web: ${{ steps.decide.outputs.admin_web }}
      any: ${{ steps.decide.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/domain/**'
            tenant_web:
              - 'apps/tenant-web/**'
            admin_web:
              - 'apps/admin-web/**'
            infra:
              - 'packages/infra/**'
              - '.github/workflows/deploy.yml'
              - 'package-lock.json'

      - name: Decide components to deploy
        id: decide
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.target }}" in
              all)
                api=true; tenant=true; admin=true ;;
              api)
                api=true; tenant=false; admin=false ;;
              tenant-web)
                api=false; tenant=true; admin=false ;;
              admin-web)
                api=false; tenant=false; admin=true ;;
              *)
                echo "Unknown target: ${{ inputs.target }}"; exit 1 ;;
            esac
          else
            # push event — use path filter results, but infra changes force --all.
            if [[ "${{ steps.filter.outputs.infra }}" == "true" ]]; then
              api=true; tenant=true; admin=true
            else
              api="${{ steps.filter.outputs.api }}"
              tenant="${{ steps.filter.outputs.tenant_web }}"
              admin="${{ steps.filter.outputs.admin_web }}"
            fi
          fi
          echo "api=${api}" >> "$GITHUB_OUTPUT"
          echo "tenant_web=${tenant}" >> "$GITHUB_OUTPUT"
          echo "admin_web=${admin}" >> "$GITHUB_OUTPUT"
          if [[ "$api" == "true" || "$tenant" == "true" || "$admin" == "true" ]]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "### Deploy plan"
            echo "| Component | Deploy |"
            echo "|---|---|"
            echo "| api | ${api} |"
            echo "| tenant-web | ${tenant} |"
            echo "| admin-web | ${admin} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Wait for CI to pass on the same commit. GitHub doesn't let one workflow
  # depend on another, so we rely on branch protection rules ("require CI
  # before merging") to gate main. For workflow_dispatch we skip the wait.
  #
  # The `deploy` job itself still runs ahead of any broken merge because the
  # `changes` job is fast and the full deploy only proceeds if changes.any.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to dev
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fix binary permissions
        run: find node_modules/.bin -type f | xargs chmod +x 2>/dev/null || true

      - name: Generate Prisma client
        working-directory: apps/api
        run: node ../../node_modules/.bin/prisma generate

      - name: Build tenant-web
        if: needs.changes.outputs.tenant_web == 'true'
        run: npm run build --workspace=@pegasus/tenant-web

      - name: Build admin-web
        if: needs.changes.outputs.admin_web == 'true'
        run: npm run build --workspace=@pegasus/admin-web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: pegasus-deploy-${{ github.run_id }}

      - name: Resolve CDK stack target
        id: target
        run: |
          set -euo pipefail
          api='${{ needs.changes.outputs.api }}'
          tenant='${{ needs.changes.outputs.tenant_web }}'
          admin='${{ needs.changes.outputs.admin_web }}'

          if [[ "$api" == "true" && "$tenant" == "true" && "$admin" == "true" ]]; then
            target="--all"
          else
            stacks=()
            if [[ "$api" == "true" ]]; then
              stacks+=( \
                PegasusDev-CognitoStack \
                PegasusDev-DocumentsStack \
                PegasusDev-ApiStack \
                PegasusDev-MonitoringStack \
              )
            fi
            if [[ "$tenant" == "true" ]]; then
              stacks+=( \
                PegasusDev-FrontendStack \
                PegasusDev-FrontendAssetsStack \
              )
            fi
            if [[ "$admin" == "true" ]]; then
              stacks+=( \
                PegasusDev-AdminFrontendStack \
                PegasusDev-AdminFrontendAssetsStack \
              )
            fi
            target="${stacks[*]}"
          fi
          echo "target=${target}" >> "$GITHUB_OUTPUT"
          echo "CDK target: ${target}"

      - name: CDK deploy
        working-directory: packages/infra
        env:
          TARGET: ${{ steps.target.outputs.target }}
        run: npm run deploy:ci

      - name: Summarise outputs
        if: success()
        run: |
          set -euo pipefail
          OUTPUTS_FILE=/tmp/pegasus-cdk-outputs.json
          if [[ ! -f "$OUTPUTS_FILE" ]]; then
            echo "No outputs file — skipping summary."
            exit 0
          fi

          WEB_URL=$(jq -r '.["pegasus-dev-frontend"].DistributionUrl // empty' "$OUTPUTS_FILE")
          ADMIN_URL=$(jq -r '.["pegasus-dev-admin-frontend"].AdminDistributionUrl // empty' "$OUTPUTS_FILE")
          API_URL=$(jq -r '.["pegasus-dev-api"].ApiUrl // empty' "$OUTPUTS_FILE")
          USER_POOL_ID=$(jq -r '.["pegasus-dev-cognito"].UserPoolId // empty' "$OUTPUTS_FILE")
          MOBILE_CLIENT_ID=$(jq -r '.["pegasus-dev-cognito"].MobileClientId // empty' "$OUTPUTS_FILE")
          HOSTED_UI=$(jq -r '.["pegasus-dev-cognito"].HostedUiBaseUrl // empty' "$OUTPUTS_FILE")

          {
            echo "### Deployed URLs"
            [[ -n "$WEB_URL" ]]   && echo "- Client app: $WEB_URL"
            [[ -n "$ADMIN_URL" ]] && echo "- Admin portal: $ADMIN_URL"
            [[ -n "$API_URL" ]]   && echo "- API: $API_URL"
          } >> "$GITHUB_STEP_SUMMARY"

          # Write mobile env artifact if we have the pieces.
          if [[ -n "$API_URL" && -n "$USER_POOL_ID" && -n "$MOBILE_CLIENT_ID" ]]; then
            mkdir -p artifacts
            cat > artifacts/mobile.env.deploy <<ENVEOF
          # Generated by deploy.yml — do not commit
          EXPO_PUBLIC_API_URL=$API_URL
          EXPO_PUBLIC_COGNITO_REGION=${AWS_REGION}
          EXPO_PUBLIC_COGNITO_USER_POOL_ID=$USER_POOL_ID
          EXPO_PUBLIC_COGNITO_CLIENT_ID=$MOBILE_CLIENT_ID
          EXPO_PUBLIC_COGNITO_DOMAIN=$HOSTED_UI
          EXPO_PUBLIC_COGNITO_REDIRECT_URI=movingapp://auth/callback
          ENVEOF
          fi

      - name: Upload CDK outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: /tmp/pegasus-cdk-outputs.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload mobile env
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-env
          path: artifacts/mobile.env.deploy
          if-no-files-found: ignore
          retention-days: 14
