name: Publish VPN agent

# Builds the apps/vpn-agent tarball and rolls it out to one or more envs.
#
# - `push` to `main`: auto-publishes to dev only (preserves prior behaviour;
#   triggers an ASG instance refresh in dev and nothing else).
# - `workflow_dispatch`: manual run with an `env` input — choose one of
#   dev, staging, or prod. Use this to roll out to staging/prod, which is
#   intentionally NOT automatic because the new instance's user-data hard-
#   fails on a missing /pegasus/wireguard/agent/apikey SSM param. Bootstrap
#   the apikey first per apps/api/scripts/bootstrap-vpn-agent-apikey.ts,
#   then dispatch this workflow against the env.
#
# The actual publish steps live in `_publish-vpn-agent.yml` (reusable).

on:
  push:
    branches: [main]
    paths:
      - 'apps/vpn-agent/**'
      - '.github/workflows/publish-vpn-agent.yml'
      - '.github/workflows/_publish-vpn-agent.yml'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        type: choice
        required: true
        default: dev
        options:
          - dev
          - staging
          - prod
      skip-instance-refresh:
        description: 'Skip the ASG instance refresh after publishing'
        type: boolean
        default: false

concurrency:
  group: publish-vpn-agent-${{ github.event_name == 'workflow_dispatch' && inputs.env || github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Auto-publish on push to main: dev only.
  #
  # Staging and prod are NOT auto-rolled because their hardened user-data
  # depends on /pegasus/wireguard/agent/apikey being bootstrapped first.
  # Use workflow_dispatch with env=staging|prod for those rollouts.
  # ---------------------------------------------------------------------------
  publish-dev:
    name: Publish to dev
    if: github.event_name == 'push'
    uses: ./.github/workflows/_publish-vpn-agent.yml
    with:
      env-name: dev
    secrets: inherit
    permissions:
      id-token: write
      contents: read

  # ---------------------------------------------------------------------------
  # Manual single-env publish. Choose dev/staging/prod via the `env` input.
  # ---------------------------------------------------------------------------
  publish-manual:
    name: Publish to ${{ inputs.env }} (manual)
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_publish-vpn-agent.yml
    with:
      env-name: ${{ inputs.env }}
      skip-instance-refresh: ${{ inputs.skip-instance-refresh }}
    secrets: inherit
    permissions:
      id-token: write
      contents: read
