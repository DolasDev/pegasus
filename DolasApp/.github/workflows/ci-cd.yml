name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Run tests
        run: npm test
        
      - name: Run test coverage
        run: npm run test:coverage
        
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build-preview:
    name: Build Preview (Expo)
    needs: test
    runs-on: ubuntu-latest
    # Only run on PRs and only if EXPO_TOKEN is set
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Setup Expo
        if: env.EXPO_TOKEN != ''
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          
      - name: Build preview
        if: env.EXPO_TOKEN != ''
        run: npx expo export --platform all
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    # Only run when pushing to develop branch
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Check for EXPO_TOKEN
        id: check-token
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "⚠️ EXPO_TOKEN not set - skipping deployment"
            echo "has_token=false" >> $GITHUB_OUTPUT
          else
            echo "✓ EXPO_TOKEN found - proceeding with deployment"
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi
        
      - name: Setup Expo
        if: steps.check-token.outputs.has_token == 'true'
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Publish to Expo (Staging)
        if: steps.check-token.outputs.has_token == 'true'
        run: npx expo publish --release-channel staging

  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    # Only run when pushing to main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Check for EXPO_TOKEN
        id: check-token
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "⚠️ EXPO_TOKEN not set - skipping builds and deployment"
            echo "To enable automatic builds, add EXPO_TOKEN to repository secrets"
            echo "has_token=false" >> $GITHUB_OUTPUT
          else
            echo "✓ EXPO_TOKEN found - proceeding with builds"
            echo "has_token=true" >> $GITHUB_OUTPUT
          fi
        
      - name: Setup Expo
        if: steps.check-token.outputs.has_token == 'true'
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Build for Android
        if: steps.check-token.outputs.has_token == 'true'
        run: npx eas build --platform android --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          
      - name: Build for iOS
        if: steps.check-token.outputs.has_token == 'true'
        run: npx eas build --platform ios --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          
      - name: Submit to Google Play (Internal)
        if: steps.check-token.outputs.has_token == 'true'
        run: npx eas submit --platform android --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}